<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙魂实训项目管理平台 - 项目详情</title>
    <link rel="stylesheet" href="css/common_pm.css">
    <style>
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .detail-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-item {
            padding: 15px;
            background-color: #f5f7fa;
            border-radius: 8px;
        }

        .info-label {
            font-size: 12px;
            color: #909399;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 18px;
            font-weight: bold;
        }

        .member-item,
        .group-item,
        .task-item {
            padding: 12px 0;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .member-info,
        .group-info,
        .task-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .member-actions,
        .group-actions,
        .task-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: white;
        }

        .badge-teacher {
            background-color: #f56c6c;
        }

        .badge-member {
            background-color: #409eff;
        }

        .task-status {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: white;
        }

        .status-done {
            background-color: #67c23a;
        }

        .status-doing {
            background-color: #409eff;
        }

        .status-todo {
            background-color: #909399;
        }

        .log-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-item {
            padding: 12px 0;
            border-bottom: 1px solid #ebeef5;
        }

        .log-time {
            font-size: 12px;
            color: #909399;
            margin-bottom: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .modal-close {
            cursor: pointer;
            font-size: 20px;
            color: #909399;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #ebeef5;
            text-align: right;
        }

        .form-check {
            margin-bottom: 10px;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <!-- 头部导航 -->
    <header class="header" id="header">
        <div class="logo">龙魂实训项目管理平台</div>
        <nav class="nav-menu">
            <a href="index_pm.html">我的项目</a>
        </nav>
        <div class="user-info" id="user-info"></div>
    </header>

    <!-- 主内容区 -->
    <main class="main">
        <div class="card">
            <div class="detail-header">
                <h1 id="project-name">项目详情</h1>
                <a href="index_pm.html" class="btn btn-primary">返回项目列表</a>
            </div>

            <div class="detail-info">
                <div class="info-item">
                    <div class="info-label">项目创建者</div>
                    <div class="info-value" id="project-creator">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">创建时间</div>
                    <div class="info-value" id="project-createtime">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">成员数</div>
                    <div class="info-value" id="project-member-count">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">项目评分</div>
                    <div class="info-value" id="project-score">未评分</div>
                </div>
            </div>

            <div class="card" style="margin-bottom: 20px;">
                <div class="card-title">项目描述</div>
                <div id="project-desc">-</div>
            </div>

            <!-- 邀请码区域（仅老师可见） -->
            <div class="card" id="invite-section">
                <div class="card-title">项目邀请码</div>
                <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                    <div id="invite-code-display"
                        style="font-size: 32px; font-family: monospace; letter-spacing: 5px; color: #1976d2; font-weight: bold;">
                        暂无邀请码
                    </div>
                    <div id="invite-expire" style="color: #909399;"></div>
                    <button class="btn btn-primary" id="generate-code-btn">
                        生成5分钟有效邀请码
                    </button>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <!-- 成员管理 -->
                <div class="card">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <div class="card-title" style="margin-bottom: 0;">项目成员</div>
                    </div>
                    <ul id="member-list" style="list-style: none; padding: 0;">
                        <!-- 成员列表动态生成 -->
                    </ul>
                </div>

                <!-- 分组管理 -->
                <div class="card">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <div class="card-title" style="margin-bottom: 0;">项目分组</div>
                        <button class="btn btn-primary btn-sm" id="add-group-btn">创建分组</button>
                    </div>
                    <ul id="group-list" style="list-style: none; padding: 0;">
                        <!-- 分组列表动态生成 -->
                    </ul>
                </div>
            </div>

            <!-- 任务管理 -->
            <div class="card" style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="card-title" style="margin-bottom: 0;">任务列表</div>
                    <button class="btn btn-primary btn-sm" id="add-task-btn">创建任务</button>
                </div>
                <ul id="task-list" style="list-style: none; padding: 0;">
                    <!-- 任务列表动态生成 -->
                </ul>
            </div>

            <!-- 进度日志 -->
            <div class="card" style="margin-top: 20px;">
                <div class="card-title">进度日志</div>
                <ul id="log-list" class="log-list">
                    <!-- 日志列表动态生成 -->
                </ul>
            </div>

            <!-- 老师评分区域 -->
            <div class="card" id="score-section" style="margin-top: 20px; display: none;">
                <div class="card-title">项目评分</div>
                <form id="score-form">
                    <div class="form-group">
                        <label class="form-label">评分（0-100）</label>
                        <input type="number" class="form-input" id="project-score-input" min="0" max="100"
                            placeholder="请输入评分">
                    </div>
                    <div class="form-group">
                        <label class="form-label">评语</label>
                        <textarea class="form-input" id="project-comment" rows="4" placeholder="请输入评语"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">提交评分</button>
                </form>
            </div>
        </div>
    </main>

    <!-- 分组管理弹窗 -->
    <div class="modal" id="group-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="group-modal-title">创建分组</div>
                <div class="modal-close" onclick="closeModal('group-modal')">&times;</div>
            </div>
            <div class="modal-body">
                <form id="group-form">
                    <input type="hidden" id="group-id">

                    <div class="form-group">
                        <label class="form-label">分组名称</label>
                        <input type="text" class="form-input" id="group-name" placeholder="请输入分组名称">
                    </div>

                    <div class="form-group">
                        <label class="form-label">分配成员</label>
                        <div id="member-checkboxes">
                            <!-- 成员多选框动态生成 -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="closeModal('group-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveGroup()">保存</button>
            </div>
        </div>
    </div>

    <!-- 任务管理弹窗 -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="task-modal-title">创建任务</div>
                <div class="modal-close" onclick="closeModal('task-modal')">&times;</div>
            </div>
            <div class="modal-body">
                <form id="task-form">
                    <input type="hidden" id="task-id">

                    <div class="form-group">
                        <label class="form-label">任务名称</label>
                        <input type="text" class="form-input" id="task-name" placeholder="请输入任务名称">
                    </div>

                    <div class="form-group">
                        <label class="form-label">任务描述（可选）</label>
                        <textarea class="form-input" id="task-desc" rows="3" placeholder="请输入任务描述"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">负责人</label>
                        <select class="form-select" id="task-assignee">
                            <!-- 负责人下拉框动态生成 -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">任务状态</label>
                        <select class="form-select" id="task-status">
                            <option value="todo">待开始</option>
                            <option value="doing">进行中</option>
                            <option value="done">已完成</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="closeModal('task-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveTask()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/common_pm.js"></script>
    <script src="js/project_detail_pm.js"></script>
</body>

</html>
