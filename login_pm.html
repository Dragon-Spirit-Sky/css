<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙魂实训项目管理平台 - 登录</title>
    <link rel="stylesheet" href="css/common_pm.css">
    <style>
        /* 全局禁止滚动 */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* 整体容器 */
        .login-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            background-color: #f0f7f4;
        }

        /* 左侧介绍区 */
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 80px;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .logo-icon {
            font-size: 60px;
            background: linear-gradient(135deg, #2e7d32 0%, #81c784 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .platform-name {
            font-size: 48px;
            font-weight: bold;
            color: #1a237e;
            margin-bottom: 10px;
        }

        .platform-en {
            font-size: 20px;
            color: #689f38;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .platform-desc {
            font-size: 18px;
            color: #546e7a;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 50px;
        }

        .feature-list {
            list-style: none;
            padding: 0;
        }

        .feature-item {
            font-size: 16px;
            color: #37474f;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .feature-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7d32 0%, #81c784 100%);
            margin-right: 15px;
        }

        /* 右侧登录区 */
        .login-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
        }

        .login-card {
            width: 450px;
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }

        .tab-group {
            display: flex;
            margin-bottom: 40px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f5f7fa;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #1976d2 0%, #66bb6a 100%);
            color: white;
            font-weight: bold;
        }

        .form-title {
            font-size: 32px;
            font-weight: bold;
            color: #1a237e;
            margin-bottom: 10px;
        }

        .form-subtitle {
            font-size: 16px;
            color: #78909c;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #37474f;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #cfd8dc;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
        }

        .password-group {
            position: relative;
        }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #1976d2;
            outline: none;
            padding: 0;
        }

        /* 自定义复选框样式 */
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #1976d2;
            vertical-align: middle;
            margin-right: 5px;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #1976d2 0%, #66bb6a 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            outline: none;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(25, 118, 210, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 错误提示样式 */
        .error-text {
            color: #f56c6c;
            font-size: 12px;
            margin-top: 5px;
        }

        /* 统一placeholder样式 */
        ::placeholder {
            color: #909399;
            opacity: 1;
        }

        :-ms-input-placeholder {
            color: #909399;
        }

        ::-ms-input-placeholder {
            color: #909399;
        }

        /* 隐藏头部导航 */
        #header {
            display: none !important;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }
            
            .login-left {
                display: none;
            }
            
            .login-card {
                width: 90%;
                padding: 30px;
            }
            
            .platform-name {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部导航（登录后自动显示） -->
    <header class="header" id="header">
        <div class="logo">龙魂实训项目管理平台</div>
        <nav class="nav-menu">
            <a href="index_pm.html" class="active">我的项目</a>
        </nav>
        <div class="user-info" id="user-info"></div>
    </header>

    <!-- 登录主体 -->
    <div class="login-wrapper">
        <!-- 左侧介绍区 -->
        <div class="login-left">
            <div class="logo">
                <div class="logo-icon">龙</div>
            </div>
            <div class="platform-name">龙魂实训项目管理平台</div>
            <div class="platform-en">LongHun Training Project Platform</div>
            <div class="platform-desc">
                简洁便利的实训作业辅助管理平台<br>
                支持团队协作、进度跟踪、成果展示与评分
            </div>
            <ul class="feature-list">
                <li class="feature-item">
                    <span class="feature-dot"></span>
                    团队项目管理
                </li>
                <li class="feature-item">
                    <span class="feature-dot"></span>
                    实时进度跟踪
                </li>
                <li class="feature-item">
                    <span class="feature-dot"></span>
                    邀请码快速加入
                </li>
            </ul>
        </div>

        <!-- 右侧登录区 -->
        <div class="login-right">
            <div class="login-card">
                <div class="tab-group">
                    <button class="tab-btn active" onclick="window.location.href='login_pm.html'">登录</button>
                    <button class="tab-btn" onclick="window.location.href='register_pm.html'">注册</button>
                </div>

                <div class="form-title">登录账户</div>
                <div class="form-subtitle">欢迎回来，请输入账户和密码</div>

                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">账户</label>
                        <input type="text" class="form-input" id="username" placeholder="请输入用户名">
                        <div class="error-text" id="username-error"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="password-group">
                            <input type="password" class="form-input" id="password" placeholder="请输入密码">
                            <button type="button" class="eye-btn" id="eye-btn">显示</button>
                        </div>
                        <div class="error-text" id="password-error"></div>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="remember-me">
                            记住密码
                        </label>
                    </div>

                    <button type="submit" class="submit-btn">立即登录</button>
                </form>
                
                <!-- 测试提示 -->
                <div style="margin-top: 20px; padding: 15px; background-color: #f5f7fa; border-radius: 12px; font-size: 14px; color: #606266;">
                    <p style="margin-bottom: 8px; font-weight: bold;">测试提示：</p>
                    <p>注册任意账号即可使用，创建项目后生成5分钟有效邀请码邀请他人加入</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/common_pm.js"></script>
    <script src="js/login_pm.js"></script>
</body>
</html>
