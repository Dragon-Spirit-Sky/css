<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙魂实训班级管理平台 - 忘记密码</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <link rel="stylesheet" href="css/common_lh.css?v=2026061506">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.8.0/dist/css/layui.css">
    <style>
        html {
            overflow-y: scroll;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .auth-wrapper {
            display: flex;
            width: 1000px;
            min-height: 620px;
            max-height: 620px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .auth-left {
            width: 540px;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 60px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(20, 184, 166, 0.15);
        }

        .logo-icon {
            font-size: 40px;
            color: #14b8a6;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(20, 184, 166, 0.5);
        }

        .platform-name {
            font-size: 42px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            white-space: nowrap;
            text-align: left;
        }

        .platform-en {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-align: left;
        }

        .platform-desc {
            font-size: 16px;
            color: rgba(255,255,255,0.55);
            text-align: left;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .feature-list {
            list-style: none;
            padding: 0;
            text-align: left;
        }

        .feature-item {
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .feature-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #14b8a6;
            box-shadow: 0 0 10px rgba(20, 184, 166, 0.6);
            margin-right: 12px;
            flex-shrink: 0;
        }

        .auth-right {
            width: 460px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        .auth-card {
            width: 400px;
            background: transparent;
            border-radius: 20px;
            padding: 40px;
        }

        .form-title {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 15px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
            box-sizing: border-box;
            color: #fff;
        }

        .form-input:focus {
            border-color: #14b8a6;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15), 0 0 12px rgba(20, 184, 166, 0.1);
            background: rgba(255,255,255,0.12);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
            outline: none;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 24px rgba(20, 184, 166, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .error-text {
            color: #f87171;
            font-size: 12px;
            margin-top: 5px;
        }

        ::placeholder {
            color: rgba(255,255,255,0.35);
            opacity: 1;
            font-size: 14px;
        }

        :-ms-input-placeholder { color: rgba(255,255,255,0.35); }
        ::-ms-input-placeholder { color: rgba(255,255,255,0.35); }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #14b8a6;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        #header {
            display: none !important;
        }

        .layui-input {
            background: rgba(255,255,255,0.08) !important;
            border-color: rgba(255,255,255,0.15) !important;
            color: #fff !important;
            border-radius: 12px !important;
        }
        .layui-input:focus {
            border-color: #14b8a6 !important;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15) !important;
        }

        #send-sms-btn {
            background: #14b8a6 !important;
            border-color: #14b8a6 !important;
            color: #fff !important;
            border-radius: 8px !important;
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="logo">龙魂实训班级管理平台</div>
        <nav class="nav-menu">
            <a href="index_lh.html" class="active">我的班级</a>
        </nav>
        <div class="user-info" id="user-info"></div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-left">
            <div class="logo">
                <div class="logo-icon">L</div>
            </div>
            <div class="platform-name">龙魂实训班级管理平台</div>
            <div class="platform-en">LongHun Training Project Platform</div>
            <div class="platform-desc">
                重置您的账户密码<br>
                请使用注册时绑定的手机号进行验证
            </div>
            <ul class="feature-list">
                <li class="feature-item">
                    <span class="feature-dot"></span>
                    手机号验证身份
                </li>
                <li class="feature-item">
                    <span class="feature-dot"></span>
                    短信验证码确认
                </li>
                <li class="feature-item">
                    <span class="feature-dot"></span>
                    设置全新密码
                </li>
            </ul>
        </div>

        <div class="auth-right">
            <div class="auth-card">
                <div class="form-title">忘记密码</div>
                <div class="form-subtitle">请通过手机号验证重置密码</div>

                <form id="forgot-form">
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="text" class="form-input layui-input" id="phone" placeholder="请输入注册时绑定的手机号" maxlength="11">
                        <div class="error-text" id="phone-error"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">短信验证码</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" class="form-input layui-input" id="sms-code" placeholder="请输入6位验证码" maxlength="6" style="flex: 1;">
                            <button type="button" class="layui-btn layui-btn-sm" id="send-sms-btn" style="white-space: nowrap;" onclick="sendSmsCode()">发送验证码</button>
                        </div>
                        <div class="error-text" id="sms-code-error"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <input type="password" class="form-input layui-input" id="password" placeholder="请输入新密码（6-16位）" autocomplete="new-password">
                        <div class="error-text" id="password-error"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">确认新密码</label>
                        <input type="password" class="form-input layui-input" id="confirm-password" placeholder="请再次输入新密码" autocomplete="new-password">
                        <div class="error-text" id="confirm-password-error"></div>
                    </div>

                    <button type="submit" class="submit-btn">重置密码</button>
                </form>

                <div class="back-link">
                    <a href="login_lh.html">← 返回登录</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/layui@2.8.0/dist/layui.js"></script>
    <script src="js/Bmob-3.0.2.min.js"></script>
    <script src="js/bmob_init.js"></script>
    <script src="js/common_lh.js?v=2026061506"></script>
    <script src="js/forgot_password_lh.js?v=2026061506"></script>
</body>
</html>
