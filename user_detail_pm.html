<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训项目管理平台 - 个人中心</title>
    <link rel="stylesheet" href="css/common_pm.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        .profile-card {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 30px;
            align-items: start;
        }
        
        .avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 80px;
            font-weight: bold;
        }
        
        .info-item {
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .info-label {
            font-weight: bold;
            color: #606266;
            display: inline-block;
            width: 100px;
        }
        
        .record-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .record-item {
            padding: 12px 0;
            border-bottom: 1px solid #ebeef5;
        }
        
        .record-time {
            font-size: 12px;
            color: #909399;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="logo">实训项目管理平台</div>
        <nav class="nav-menu">
            <a href="index_pm.html">首页</a>
            <a href="project_list_pm.html">项目列表</a>
        </nav>
        <div class="user-info" id="user-info"></div>
    </header>

    <!-- 主内容区 -->
    <main class="main">
        <div class="card">
            <div class="card-title">个人信息</div>
            <div class="profile-card">
                <div class="avatar" id="user-avatar">-</div>
                <div>
                    <div class="info-item">
                        <span class="info-label">用户名：</span>
                        <span id="user-username">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">用户角色：</span>
                        <span id="user-role">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">所在小组：</span>
                        <span id="user-group">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">邮箱：</span>
                        <span id="user-email">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">注册时间：</span>
                        <span id="user-createtime">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <div class="card">
                <div class="card-title">个人任务完成趋势</div>
                <div id="task-chart" class="chart-container"></div>
            </div>

            <div class="card">
                <div class="card-title">操作记录</div>
                <ul id="record-list" class="record-list">
                    <!-- 操作记录动态生成 -->
                </ul>
            </div>
        </div>
    </main>

    <script src="js/common_pm.js"></script>
    <script src="js/user_detail_pm.js"></script>
</body>
</html>
