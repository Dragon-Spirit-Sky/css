<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙魂实训班级管理平台 - 数据可视化</title>
    <link rel="stylesheet" href="css/common_lh.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.8.0/dist/css/layui.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        .chart-card {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(148, 163, 184, 0.15), 0 2px 8px rgba(148, 163, 184, 0.08);
            margin-bottom: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .chart-inner {
            width: 100%;
            height: 380px;
        }
        .vote-list-card {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(148, 163, 184, 0.15), 0 2px 8px rgba(148, 163, 184, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .vote-list-card h3 {
            color: #1e293b;
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 0 1px rgba(255, 255, 255, 0.8);
        }
        .vote-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .vote-card {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(148, 163, 184, 0.12), 0 2px 6px rgba(148, 163, 184, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .vote-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(148, 163, 184, 0.2);
        }
        .vote-card-header {
            padding: 14px 16px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .vote-card-rank {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }
        .vote-card-rank.gold { background: linear-gradient(135deg, #ffd700, #ffab00); color: #fff; }
        .vote-card-rank.silver { background: linear-gradient(135deg, #b0bec5, #78909c); color: #fff; }
        .vote-card-rank.bronze { background: linear-gradient(135deg, #ff8a65, #d84315); color: #fff; }
        .vote-card-rank.normal { background: #e8eaf6; color: #5c6bc0; }
        .vote-card-name {
            font-size: 15px;
            font-weight: 600;
            color: #1e3a8a;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .vote-card-image {
            width: 100%;
            min-height: 180px;
            background: linear-gradient(135deg, #e8eaf6 0%, #f5f3ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vote-card-image img {
            width: 100%;
            object-fit: contain;
            display: block;
        }
        .vote-card-image .no-image {
            font-size: 48px;
            color: #c0c8d8;
        }
        .vote-card-footer {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }
        .vote-card-members {
            font-size: 12px;
            color: #a0a8b8;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .vote-card-votes {
            font-size: 13px;
            font-weight: 600;
            color: #5a7fc2;
            margin-right: 10px;
            white-space: nowrap;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a8b8;
        }
        .empty-state .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <header class="header" id="header">
        <div class="logo">龙魂实训班级管理平台</div>
        <nav class="nav-menu">
            <a href="index_lh.html">我的班级</a>
            <a href="project_list_lh.html">班级列表</a>
        </nav>
        <div class="user-info" id="user-info"></div>
    </header>

    <main class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h1 style="font-size: 24px; color: #ffffff; margin: 0;" id="page-title">🏆 排行榜</h1>
            <a href="#" id="back-to-detail" class="layui-btn layui-btn-sm" style="color: #ffffff !important;">← 返回班级详情</a>
        </div>

        <div class="chart-card">
            <div class="chart-inner" id="chart-main"></div>
        </div>

        <div class="vote-list-card" id="vote-list-container">
            <h3>📋 所有小组排名</h3>
            <div id="vote-list"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/layui@2.8.0/dist/layui.js"></script>
    <script src="js/Bmob-3.0.2.min.js"></script>
    <script src="js/bmob_init.js"></script>
    <script src="js/common_lh.js"></script>
    <script src="js/dashboard_lh.js"></script>
</body>

</html>
