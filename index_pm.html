<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训项目管理平台 - 我的项目</title>
    <link rel="stylesheet" href="css/common_pm.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }
        
        .modal-close {
            cursor: pointer;
            font-size: 20px;
            color: #909399;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .modal-footer {
            padding: 20px;
            border-top: 1px solid #ebeef5;
            text-align: right;
        }
        
        .project-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .project-name {
            font-size: 20px;
            font-weight: bold;
        }
        
        .project-role {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
        }
        
        .role-teacher {
            background-color: #f56c6c;
        }
        
        .role-member {
            background-color: #409eff;
        }
        
        .invite-code {
            background-color: #f5f7fa;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 2px;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- 头部导航 -->
    <header class="header" id="header">
        <div class="logo">实训项目管理平台</div>
        <nav class="nav-menu">
            <a href="index_pm.html" class="active">我的项目</a>
        </nav>
        <div class="user-info" id="user-info"></div>
    </header>

    <!-- 主内容区 -->
    <main class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>我的项目</h1>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-success" id="join-project-btn">加入项目</button>
                <button class="btn btn-primary" id="create-project-btn">创建新项目</button>
            </div>
        </div>

        <div id="projects-container">
            <!-- 项目卡片通过JS动态生成 -->
        </div>

        <div id="empty-state" style="text-align: center; padding: 100px 0; display: none;">
            <div style="font-size: 60px; color: #dcdfe6; margin-bottom: 20px;">📁</div>
            <div style="font-size: 18px; color: #909399;">你还没有加入任何项目</div>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="openCreateModal()">创建第一个项目</button>
                <span style="margin: 0 10px; color: #909399;">或</span>
                <button class="btn btn-success" onclick="openJoinModal()">通过邀请码加入</button>
            </div>
        </div>
    </main>

    <!-- 创建项目弹窗 -->
    <div class="modal" id="create-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">创建新项目</div>
                <div class="modal-close" onclick="closeModal('create-modal')">&times;</div>
            </div>
            <div class="modal-body">
                <form id="create-form">
                    <div class="form-group">
                        <label class="form-label">项目名称</label>
                        <input type="text" class="form-input" id="project-name" placeholder="请输入项目名称">
                        <div class="error-text" id="project-name-error"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">项目描述</label>
                        <textarea class="form-input" id="project-desc" rows="3" placeholder="请输入项目描述（可选）"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="closeModal('create-modal')">取消</button>
                <button class="btn btn-primary" onclick="createProject()">创建</button>
            </div>
        </div>
    </div>

    <!-- 加入项目弹窗 -->
    <div class="modal" id="join-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">加入项目</div>
                <div class="modal-close" onclick="closeModal('join-modal')">&times;</div>
            </div>
            <div class="modal-body">
                <form id="join-form">
                    <div class="form-group">
                        <label class="form-label">6位邀请码</label>
                        <input type="text" class="form-input" id="invite-code" placeholder="请输入6位数字邀请码" maxlength="6">
                        <div class="error-text" id="invite-code-error"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="closeModal('join-modal')">取消</button>
                <button class="btn btn-primary" onclick="joinProject()">加入</button>
            </div>
        </div>
    </div>

    <script src="js/common_pm.js"></script>
    <script src="js/index_pm.js"></script>
</body>
</html>
